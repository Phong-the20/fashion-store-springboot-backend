# Hibernate DDL auto settings - để tự động tạo/validate schema
# Thêm các dòng này vào application.properties của bạn

# Option 1: Auto-create missing tables (development)
spring.jpa.hibernate.ddl-auto=update

# Option 2: Validate schema only (production)
# spring.jpa.hibernate.ddl-auto=validate

# Option 3: Create tables automatically (development)
# spring.jpa.hibernate.ddl-auto=create

# Show SQL for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Server specific settings
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=FashionStore;encrypt=false;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=your_password_here

# Hibernate logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
