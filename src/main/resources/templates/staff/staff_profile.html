<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Profile - Fashion Store</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<!-- Staff Header -->
<div th:replace="~{fragments/header :: staffheader}"></div>

<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .profile-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .profile-header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .profile-header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .profile-body {
            padding: 40px;
        }
        .profile-section {
            margin-bottom: 40px;
        }
        .profile-section h3 {
            color: #333;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .profile-section h3 i {
            color: #667eea;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        .info-item:hover {
            background: #e9ecef;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            border-left-color: #667eea;
        }
        .info-item i {
            font-size: 1.5rem;
            color: #667eea;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }
        .info-content {
            flex: 1;
        }
        .info-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 1.1rem;
            color: #333;
            font-weight: 600;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .btn-action {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108, 117, 125, 0.3);
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);
        }
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left-color: #28a745;
        }
        .alert-danger {
            background: #fee;
            color: #c33;
            border-left-color: #dc3545;
        }
        .alert i {
            font-size: 1.3rem;
        }
        .back-link {
            margin-top: 30px;
            text-align: center;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(102, 126, 234, 0.1);
        }
        .back-link a:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateX(-5px);
        }
        .badge {
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .badge-success {
            background: #28a745;
            color: white;
        }
        .badge-danger {
            background: #dc3545;
            color: white;
        }
        .badge-warning {
            background: #ffc107;
            color: #212529;
        }
        @media (max-width: 768px) {
            .profile-header h1 {
                font-size: 2rem;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
            .btn-action {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
</body>
<div class="profile-container" style="margin-top: 100px;">
    <!-- Profile Header -->
    <div class="profile-header">
        <h1><i class="bi bi-person-badge"></i> Staff Profile</h1>
        <p>Thông tin cá nhân nhân viên</p>
    </div>

    <!-- Profile Body -->
    <div class="profile-body">
        <!-- Success/Error Messages -->
        <div class="alert alert-success" th:if="${success}">
            <i class="bi bi-check-circle-fill"></i>
            <div>
                <strong>Thành công!</strong> <span th:text="${success}"></span>
            </div>
        </div>
        
        <div class="alert alert-danger" th:if="${error}">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <div>
                <strong>Lỗi!</strong> <span th:text="${error}"></span>
            </div>
        </div>

        <!-- Basic Information -->
        <div class="profile-section">
            <h3><i class="bi bi-person"></i> Thông tin cơ bản</h3>
            <div class="info-grid">
                <div class="info-item">
                    <i class="bi bi-person-fill"></i>
                    <div class="info-content">
                        <div class="info-label">Họ và tên</div>
                        <div class="info-value" th:text="${staff?.fullName ?: 'N/A'}">Tên nhân viên</div>
                    </div>
                </div>
                
                <div class="info-item">
                    <i class="bi bi-envelope-fill"></i>
                    <div class="info-content">
                        <div class="info-label">Email</div>
                        <div class="info-value" th:text="${staff?.email ?: 'N/A'}">email@example.com</div>
                    </div>
                </div>
                
                <div class="info-item">
                    <i class="bi bi-telephone-fill"></i>
                    <div class="info-content">
                        <div class="info-label">Số điện thoại</div>
                        <div class="info-value" th:text="${staff?.phone ?: 'N/A'}">0123456789</div>
                    </div>
                </div>
                
                <div class="info-item">
                    <i class="bi bi-shield-fill"></i>
                    <div class="info-content">
                        <div class="info-label">Vai trò</div>
                        <div class="info-value">
                            <span class="badge badge-success">
                                <i class="bi bi-person-badge-fill"></i> 
                                <span th:text="${staff?.role?.roleName ?: 'Staff'}">Staff</span>
                            </span>
                        </div>
                    </div>
                </div>
                
                <div class="info-item">
                    <i class="bi bi-check-circle-fill"></i>
                    <div class="info-content">
                        <div class="info-label">Trạng thái</div>
                        <div class="info-value">
                            <span th:if="${staff?.status?.equalsIgnoreCase('active')}" class="badge badge-success">
                                <i class="bi bi-check-circle"></i> Hoạt động
                            </span>
                            <span th:unless="${staff?.status?.equalsIgnoreCase('active')}" class="badge badge-danger">
                                <i class="bi bi-x-circle"></i> Không hoạt động
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <a th:href="@{/staff/dashboard}" class="btn-action btn-secondary">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            
            <a th:href="@{/logout}" class="btn-action btn-danger">
                <i class="bi bi-box-arrow-right"></i> Đăng xuất
            </a>
        </div>

        <!-- Back Link -->
        <div class="back-link">
            <a th:href="@{/staff/dashboard}">
                <i class="bi bi-arrow-left"></i> Quay lại Dashboard
            </a>
        </div>
    </div>
</div>
</body>
</html>
