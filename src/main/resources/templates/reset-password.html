<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300;url=/fashionstore/forgot-password">
    <title>Reset Password - Fashion Store</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .reset-left {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .reset-left h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 20px; }
        .reset-right { padding: 60px 40px; }
        .reset-right h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 10px; color: #333; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .form-control:focus { border-color: #667eea; outline: none; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .otp-input {
            text-align: center;
            letter-spacing: 5px;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .btn-reset {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3;
        }
        .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
        .alert { padding: 12px 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; }
        .alert-danger { background: #fee; color: #c33; border: 1px solid #fcc; }
        .alert-success { background: #efe; color: #3c3; border: 1px solid #cfc; }
        .back-link { text-align: center; margin-top: 25px; }
        .back-link a { color: #667eea; text-decoration: none; font-weight: 600; }

        @media (max-width: 768px) {
            .reset-container { grid-template-columns: 1fr; }
            .reset-left { display: none; }
        }
    </style>
</head>
<body>

<div class="reset-container">
    <div class="reset-left">
        <div>
            <h1>Reset Password</h1>
            <p>Enter the OTP code and your new password to complete the reset process.</p>
            <svg class="illustration" viewBox="0 0 500 500" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
                <rect x="150" y="200" width="200" height="120" rx="10" fill="none" stroke="white" stroke-width="10"/>
                <circle cx="250" cy="260" r="20" fill="white"/>
                <path d="M200 320 L300 320" stroke="white" stroke-width="10" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <div class="reset-right">
        <h2>Create New Password</h2>
        <p>Enter OTP and set your new password</p>

        <div style="background: #f8f9ff; border-left: 4px solid #667eea; padding: 10px 15px; margin-bottom: 20px; border-radius: 4px;">
            <small style="color: #555; display: block;">
                <i class="bi bi-clock-history"></i> Mã xác thực có hiệu lực trong <b>5 phút</b>.
            </small>
        </div>

        <div class="alert alert-danger" th:if="${error}">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <div class="alert alert-success" th:if="${success}">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <form th:action="@{/reset-password}" method="post">
            <div class="form-group">
                <label for="otp"><i class="bi bi-shield-check"></i> OTP Code</label>
                <input type="text"
                       class="form-control otp-input"
                       id="otp"
                       name="otp"
                       placeholder="000000"
                       maxlength="6"
                       required
                       oninput="this.value = this.value.replace(/[^0-9]/g, '');">
            </div>

            <div class="form-group">
                <label for="newPassword"><i class="bi bi-lock"></i> New Password</label>
                <input type="password"
                       class="form-control"
                       id="newPassword"
                       name="newPassword"
                       placeholder="6 ký tự chữ hoặc số"
                       required
                       pattern="^[A-Za-z0-9]{6}$"
                       minlength="6"
                       maxlength="6"
                       title="Mật khẩu chỉ gồm 6 ký tự chữ và số">
            </div>

            <div class="form-group">
                <label for="confirmPassword"><i class="bi bi-lock-fill"></i> Confirm New Password</label>
                <input type="password"
                       class="form-control"
                       id="confirmPassword"
                       name="confirmPassword"
                       placeholder="Nhập lại mật khẩu mới"
                       required
                       pattern="^[A-Za-z0-9]{6}$"
                       minlength="6"
                       maxlength="6"
                       title="Mật khẩu chỉ gồm 6 ký tự chữ và số">
            </div>

            <button type="submit" class="btn-reset">
                <i class="bi bi-check-circle"></i> Reset Password
            </button>
        </form>

        <div class="back-link">
            <a th:href="@{/forgot-password}">
                <i class="bi bi-arrow-left"></i> Back to Forgot Password
            </a>
        </div>
    </div>
</div>

<script>
// Validate password match
document.querySelector('form').addEventListener('submit', function(e) {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    if (newPassword !== confirmPassword) {
        e.preventDefault();
        alert('Mật khẩu mới và xác nhận mật khẩu không khớp!');
        return false;
    }
});
</script>

</body>
</html>
