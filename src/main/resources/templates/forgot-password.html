<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - Fashion Store</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .forgot-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .forgot-left {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .forgot-left h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 20px; }
        .forgot-right { padding: 60px 40px; }
        .forgot-right h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 10px; color: #333; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .form-control:focus { border-color: #667eea; outline: none; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn-send {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3;
        }
        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
        .alert { padding: 12px 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; }
        .alert-danger { background: #fee; color: #c33; border: 1px solid #fcc; }
        .alert-success { background: #efe; color: #3c3; border: 1px solid #cfc; }
        .back-link { text-align: center; margin-top: 25px; }
        .back-link a { color: #667eea; text-decoration: none; font-weight: 600; }

        @media (max-width: 768px) {
            .forgot-container { grid-template-columns: 1fr; }
            .forgot-left { display: none; }
        }
    </style>
</head>
<body>

<div class="forgot-container">
    <div class="forgot-left">
        <div>
            <h1>Forgot Password?</h1>
            <p>Don't worry! We'll help you reset your password. Just enter your email address.</p>
            <svg class="illustration" viewBox="0 0 500 500" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
                <path d="M100 150 L400 150 L400 350 L100 350 Z" fill="none" stroke="white" stroke-width="10"/>
                <path d="M100 150 L250 250 L400 150" fill="none" stroke="white" stroke-width="10"/>
                <circle cx="250" cy="380" r="30" fill="white" opacity="0.3"/>
            </svg>
        </div>
    </div>

    <div class="forgot-right">
        <h2>Reset Password</h2>
        <p>Enter your email to receive a password reset code</p>

        <div class="alert alert-danger" th:if="${error}">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <div class="alert alert-success" th:if="${success}">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="form-group">
                <label for="email"><i class="bi bi-envelope"></i> Email Address</label>
                <input type="email"
                       class="form-control"
                       id="email"
                       name="email"
                       placeholder="Enter your email address"
                       required>
            </div>

            <button type="submit" class="btn-send">
                <i class="bi bi-send"></i> Send Reset Code
            </button>
        </form>

        <div class="back-link">
            <a th:href="@{/login}">
                <i class="bi bi-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>
</div>

</body>
</html>
