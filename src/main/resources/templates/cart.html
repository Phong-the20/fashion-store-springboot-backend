<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng - FashionStore</title>

    <!-- Bootstrap 5 CSS -->
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <!-- Common Styles -->
    <link th:href="@{/css/common.css}" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- Common Styles -->
    <link rel="stylesheet" th:href="@{/css/common.css}">

    <style>
        /* Cart Page Specific Styles */
        body {
            padding-top: 100px;
        }
        
        /* Fix navbar positioning */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        /* Cart Section */
        .cart-section {
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-link {
            color: var(--dark-text);
            font-weight: 500;
            margin: 0 0.5rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 80%;
        }

        .nav-link:hover {
            color: var(--primary-color);
        }

        /* Mega Dropdown Menu */
        .nav-item.dropdown {
            position: relative;
        }

        .mega-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 2rem;
            min-width: 600px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            padding-top: 2.5rem;
            z-index: 1000;
        }

        .nav-item.dropdown:hover .mega-dropdown,
        .mega-dropdown:hover {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .dropdown-category {
            margin-bottom: 1.5rem;
        }

        .category-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-icons {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }

        .nav-icon {
            font-size: 1.3rem;
            color: var(--dark-text);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .nav-icon:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icons .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 157, 0.3);
        }

        .nav-icons .btn-outline:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-color: transparent;
        }

        /* User Dropdown */
        .user-dropdown-wrapper {
            position: relative;
            display: inline-block;
        }
        .user-dropdown-wrapper > a {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .user-dropdown-wrapper > a:hover .nav-icon {
            color: var(--primary-color);
            transform: scale(1.1);
        }
        .user-dropdown {
            position: absolute;
            top: calc(100% + 0.8rem);
            right: -10px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 0.5rem 0;
            min-width: 240px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-10px);
            z-index: 1050;
        }
        .user-dropdown::before {
            content: '';
            position: absolute;
            top: -6px;
            right: 20px;
            width: 12px;
            height: 12px;
            background: white;
            transform: rotate(45deg);
            box-shadow: -2px -2px 5px rgba(0, 0, 0, 0.05);
        }
        .user-dropdown-wrapper:hover .user-dropdown {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0);
        }
        .user-dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1.5rem;
            color: var(--dark-text);
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            cursor: pointer;
            position: relative;
            z-index: 1;
        }
        .user-dropdown-item i {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
            transition: transform 0.2s ease;
        }
        .user-dropdown-item:hover {
            background: var(--light-bg);
            color: var(--primary-color);
            padding-left: 1.8rem;
        }
        .user-dropdown-item:hover i {
            transform: scale(1.1);
        }
        .user-dropdown-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #eee, transparent);
            margin: 0.5rem 0;
        }
        .user-dropdown-item.logout { color: #e74c3c; }
        .user-dropdown-item.logout:hover {
            background: #fee;
            color: #c0392b;
        }

        /* Cart Section */
        .cart-section {
            padding: 3rem 0;
            min-height: calc(100vh - 200px);
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
        }

        .page-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            border-radius: 2px;
        }

        .cart-item {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .cart-item:hover {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .cart-item-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-item-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--dark-text);
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .quantity-btn {
            width: 35px;
            height: 35px;
            border: 2px solid var(--primary-color);
            background: white;
            border-radius: 50%;
            color: var(--primary-color);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quantity-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        .quantity-input {
            width: 60px;
            text-align: center;
            border: 2px solid #eee;
            border-radius: 8px;
            padding: 0.5rem;
            font-weight: 600;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .remove-btn:hover {
            color: #c0392b;
            transform: scale(1.2);
        }

        .cart-summary {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 100px;
        }

        .summary-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--dark-text);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }

        .summary-row:last-child {
            border-bottom: none;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 1rem;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 157, 0.3);
        }

        .continue-shopping {
            display: block;
            width: 100%;
            background: white;
            border: 2px solid var(--primary-color);
            padding: 1rem;
            border-radius: 10px;
            color: var(--primary-color);
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 1rem;
            text-align: center;
            text-decoration: none;
        }

        .continue-shopping:hover {
            background: var(--light-bg);
            color: var(--primary-color);
        }

        .empty-cart {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-cart-icon {
            font-size: 5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        /* Footer */
        .footer {
            background: linear-gradient(135deg, #2C3E50 0%, #34495E 100%);
            color: white;
            padding: 4rem 0 2rem;
            margin-top: 3rem;
        }

        .footer-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .footer-links {
            list-style: none;
            padding: 0;
        }

        .footer-links li {
            margin-bottom: 0.8rem;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--primary-color);
            padding-left: 5px;
        }

        .social-icons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .social-icon:hover {
            background: var(--primary-color);
            transform: translateY(-5px);
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 3rem;
            padding-top: 2rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
<!-- Header -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Cart Section -->
<section class="cart-section">
    <div class="container">
        <h1 class="page-title">Giỏ Hàng Của Bạn</h1>

        <!-- Check if cart is empty -->
        <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-5">
            <div class="empty-cart">
                <i class="bi bi-cart-x empty-cart-icon"></i>
                <h3>Giỏ hàng của bạn đang trống</h3>
                <p class="text-muted">Hãy thêm sản phẩm vào giỏ hàng để tiếp tục mua sắm!</p>
                <a th:href="@{/products}" class="btn btn-primary mt-3">
                    <i class="bi bi-arrow-left me-2"></i>Tiếp Tục Mua Sắm
                </a>
            </div>
        </div>

        <!-- Cart Items Section -->
        <div th:if="${!#lists.isEmpty(cartItems)}" class="row">
            <div class="col-lg-8">
                <!-- Cart Items -->
                <div th:each="item : ${cartItems}" class="cart-item">
                    <div class="row align-items-center">
                        <div class="col-md-2">
                            <img th:src="${item.productVariant.imageUrl}" 
                                 th:alt="${item.productVariant.product.productName}" 
                                 class="cart-item-image"
                                 onerror="this.src='https://via.placeholder.com/120'">
                        </div>
                        <div class="col-md-4">
                            <h3 class="cart-item-name" th:text="${item.productVariant.product.productName}">Tên sản phẩm</h3>
                            <p class="text-muted mb-0">
                                Size: <span th:text="${item.productVariant.categorySize?.sizeName ?: 'N/A'}">M</span> | 
                                Màu: <span th:text="${item.productVariant.color?.colorName ?: 'N/A'}">Trắng</span>
                            </p>
                        </div>
                        <div class="col-md-3">
                            <form th:action="@{/cart/update}" method="POST" class="quantity-control">
                                <input type="hidden" name="cartItemId" th:value="${item.cartItemId}">
                                <button type="submit" name="action" value="decrease" class="quantity-btn">-</button>
                                <input type="number" class="quantity-input" th:value="${item.quantity}" min="1" readonly>
                                <button type="submit" name="action" value="increase" class="quantity-btn">+</button>
                            </form>
                        </div>
                        <div class="col-md-2">
                            <p class="cart-item-price mb-0" 
                               th:text="${#numbers.formatDecimal(item.productVariant.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</p>
                        </div>
                        <div class="col-md-1 text-end">
                            <form th:action="@{/cart/remove}" method="POST" style="display: inline;">
                                <input type="hidden" name="cartItemId" th:value="${item.cartItemId}">
                                <button type="submit" class="remove-btn" onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cart Summary -->
            <div class="col-lg-4">
                <div class="cart-summary" th:if="${!#lists.isEmpty(cartItems)}">
                    <h2 class="summary-title">Tổng Đơn Hàng</h2>
                    <div class="summary-row">
                        <span>Tạm tính:</span>
                        <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                    </div>
                    <div class="summary-row">
                        <span>Tổng cộng:</span>
                        <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                    </div>
                    <a th:href="@{/order/checkout}" class="btn btn-primary w-100" style="background: var(--primary-color); border: none;">
                        <i class="bi bi-credit-card me-2"></i> Thanh Toán
                    </a>
                    <a th:href="@{/products}" class="continue-shopping"><i class="bi bi-arrow-left me-2"></i>Tiếp Tục Mua Sắm</a>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Bootstrap JS (required for responsive navigation) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
