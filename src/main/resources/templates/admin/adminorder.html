<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng - Admin</title>

    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #FF6B9D;
            --secondary-color: #C44569;
            --dark-text: #2C3E50;
            --light-bg: #FFF9F9;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--dark-text);
            background-color: var(--light-bg);
        }

        .admin-container {
            padding: 2rem 0;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .table-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .badge-status {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-pending {
            background: #fff3cd;
            color: #856404;
        }

        .badge-shipping {
            background: #cce5ff;
            color: #004085;
        }

        .badge-completed {
            background: #d4edda;
            color: #155724;
        }

        .badge-confirmed {
            background: #d1ecf1;
            color: #0c5460;
        }

        .btn-action {
            padding: 0.4rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin: 0 0.2rem;
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/header :: adminheader}"></div>

<div class="admin-container" style="margin-top: 80px;">
    <div class="container-fluid">
        <h1 class="page-title">Quản Lý Đơn Hàng</h1>

        <div class="table-card">
            <h3 class="mb-3">Danh Sách Đơn Hàng</h3>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Mã ĐH</th>
                        <th>Khách hàng</th>
                        <th>Ngày đặt</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td><strong>#DH[[${order.orderId}]]</strong></td>

                        <td th:text="${order.customer.fullName}"></td>

                        <td th:text="${#dates.format(order.orderDate,'dd/MM/yyyy')}"></td>

                        <td>
                            <strong th:text="${#numbers.formatDecimal(order.calculatedTotal,0,'COMMA',0,'POINT')} + ' đ'"></strong>
                        </td>

                        <td>
    <span class="badge-status" th:classappend="
        ${order.status != null and order.status.name() == 'PENDING'} ? ' badge-pending' :
        (${order.status != null and order.status.name() == 'SHIPPING'} ? ' badge-shipping' :
        (${order.status != null and order.status.name() == 'COMPLETED'} ? ' badge-completed' :
        (${order.status != null and order.status.name() == 'CANCELLED'} ? ' bg-danger text-white' : ' badge-confirmed')))"
          th:text="${order.status != null ? order.status.displayName : 'N/A'}">
    </span>
                        </td>

                        <td>

                            <a th:href="@{/admin/orders/orderdetails/{id}(id=${order.orderId})}" class="btn btn-sm btn-warning btn-action">
                                Xem Chi tiết
                            </a>

                            <button type="button" class="btn btn-sm btn-primary btn-action" data-bs-toggle="modal" th:data-bs-target="'#updateModal' + ${order.orderId}">
                                Update
                            </button>

                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:each="order : ${orders}">
                <div class="modal fade" th:id="'updateModal' + ${order.orderId}" tabindex="-1">

                    <div class="modal-dialog">
                        <div class="modal-content">

                            <div class="modal-header">
                                <h5 class="modal-title">
                                    Cập nhật trạng thái - ĐH #DH[[${order.orderId}]]
                                </h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal">
                                </button>
                            </div>

                            <form th:action="@{/admin/orders/update-status/{id}(id=${order.orderId})}" method="post">

                                <div class="modal-body">

                                    <select name="status" class="form-select" th:id="'statusSelect' + ${order.orderId}">
                                        <option th:each="statusEnum : ${T(vn.edu.fpt.fashionstore.entity.OrderStatus).values()}"
                                                th:value="${statusEnum.name()}"
                                                th:text="${statusEnum.displayName}"
                                                th:selected="${order.status != null and order.status.name() == statusEnum.name()}">
                                        </option>
                                    </select>

                                </div>

                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                        Hủy
                                    </button>

                                    <button type="submit" class="btn btn-primary">
                                        Lưu thay đổi
                                    </button>
                                </div>

                            </form>

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Prevent form submission for completed orders
    document.addEventListener('DOMContentLoaded', function() {
        const forms = document.querySelectorAll('form[action*="update-status"]');

        forms.forEach(form => {
            form.addEventListener('submit', function(e) {
                const statusSelect = this.querySelector('select[name="status"]');
                const currentStatus = statusSelect.querySelector('option[selected]').value;
                const newStatus = statusSelect.value;

                // Prevent changing from Completed to Shipping or Pending
                if (currentStatus === 'COMPLETED' && (newStatus === 'SHIPPING' || newStatus === 'PENDING' || newStatus === 'CONFIRMED')) {
                    e.preventDefault();

                    // Remove existing error message if any
                    const existingError = statusSelect.parentNode.querySelector('.error-message');
                    if (existingError) {
                        existingError.remove();
                    }

                    // Create and show error message
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'error-message alert alert-danger mt-2 mb-0';
                    errorDiv.style.fontSize = '0.85rem';
                    errorDiv.innerHTML = '<i class="bi bi-exclamation-circle"></i> Đơn hàng đã hoàn thành không thể thay đổi về trạng thái đang giao hoặc chờ xử lý!';

                    statusSelect.parentNode.appendChild(errorDiv);

                    // Remove error message after 3 seconds
                    setTimeout(() => {
                        errorDiv.remove();
                    }, 3000);

                    return false;
                }
            });
        });
    });
</script>

</body>

</html>
