<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết đơn hàng</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
</head>

<body>

<div th:replace="~{fragments/header :: adminheader}"></div>

<div class="container" style="margin-top:100px;">

    <h2 class="mb-4">Chi tiết đơn hàng #DH[[${order.orderId}]]</h2>

    <div class="card mb-4">
        <div class="card-body">

            <p><strong>Khách hàng:</strong>
                <span th:text="${order.customer.fullName}"></span>
            </p>

            <p><strong>Số điện thoại:</strong>
                <span th:text="${order.customer.phone}"></span>
            </p>

            <p><strong>Ngày đặt:</strong>
                <span th:text="${#dates.format(order.orderDate,'dd/MM/yyyy')}"></span>
            </p>

            <p><strong>Trạng thái:</strong>
                <span th:text="${order.status}"></span>
            </p>

            <p><strong>Địa chỉ giao hàng:</strong>
                <span th:text="${order.shippingAddress}"></span>
            </p>

        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h5>Danh sách sản phẩm</h5>
        </div>

        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-bordered">

                    <thead>
                    <tr>
                        <th>Ảnh</th>
                        <th>Sản phẩm</th>
                        <th>Giá</th>
                        <th>Số lượng</th>
                        <th>Thành tiền</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="item : ${order.orderItems}">

                        <td>
                            <img th:src="@{${item.productVariant.imageUrl}}" width="70" height="70" style="object-fit:cover;">
                        </td>

                        <td th:text="${item.productVariant.product.productName}"></td>

                        <td th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + ' đ'"></td>

                        <td th:text="${item.quantity}"></td>

                        <td th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')} + ' đ'"></td>

                    </tr>

                    </tbody>

                </table>
            </div>

            <div class="text-end mt-3">
                <h4>
                    Tổng tiền:
                    <span class="text-danger" th:text="${#numbers.formatDecimal(order.calculatedTotal,0,'COMMA',0,'POINT')} + ' đ'"></span>
                </h4>
            </div>

        </div>
    </div>

    <div class="mt-4 mb-5">
        <a th:href="@{/admin/orders}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Quay lại
        </a>
        <a th:href="@{/admin/orders/orderdetails/{id}/pdf(id=${order.orderId})}" class="btn btn-danger">
            In Đơn Hàng
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
