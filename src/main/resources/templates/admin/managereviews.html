<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đánh Giá - Admin</title>

    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --dark-text: #2C3E50; --light-bg: #FFF9F9; }
        body { font-family: 'Poppins', sans-serif; color: var(--dark-text); background-color: var(--light-bg); }
        .admin-container { padding: 2rem 0; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; margin-bottom: 2rem; }
        .table-card { background: white; border-radius: 15px; padding: 1.5rem; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08); }
        .star-rating i { color: #ffc107; }
        .comment-text { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>

<body>

<div th:replace="~{fragments/header :: adminheader}"></div>

<div class="admin-container" style="margin-top: 80px;">
    <div class="container-fluid">
        <h1 class="page-title">Quản Lý Đánh Giá (Reviews)</h1>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="table-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Khách hàng</th>
                        <th>Sản phẩm</th>
                        <th>Số sao</th>
                        <th>Nội dung</th>
                        <th>Ngày đánh giá</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="review : ${reviews}">
                        <td><strong th:text="'#REV' + ${review.reviewId}"></strong></td>

                        <td th:text="${review.customer.fullName}"></td>

                        <td>
                            <a th:href="@{'/products/detail/' + ${review.product.productId}}" target="_blank" class="text-decoration-none fw-bold" th:text="${review.product.productName}"></a>
                        </td>

                        <td class="star-rating">
                            <span class="fw-bold me-1" th:text="${review.rating}"></span>
                            <i class="bi bi-star-fill"></i>
                        </td>

                        <td class="comment-text" th:text="${review.comment}" th:title="${review.comment}"></td>

                        <td th:text="${#dates.format(review.reviewDate,'dd/MM/yyyy HH:mm')}"></td>

                        <td>
                            <span th:if="${review.isActive}" class="badge bg-success rounded-pill px-3 py-2">Đang hiển thị</span>
                            <span th:unless="${review.isActive}" class="badge bg-secondary rounded-pill px-3 py-2">Đã bị ẩn</span>
                        </td>

                        <td>
                            <form th:action="@{/admin/reviews/toggle/{id}(id=${review.reviewId})}" method="post" style="display:inline;">
                                <button th:if="${review.isActive}" type="submit" class="btn btn-sm btn-outline-danger" title="Ẩn đánh giá này">
                                    <i class="bi bi-eye-slash-fill"></i> Ẩn
                                </button>
                                <button th:unless="${review.isActive}" type="submit" class="btn btn-sm btn-outline-success" title="Hiển thị lại đánh giá này">
                                    <i class="bi bi-eye-fill"></i> Hiện
                                </button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(reviews)}">
                        <td colspan="8" class="text-center text-muted py-4">Chưa có đánh giá nào trong hệ thống.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
