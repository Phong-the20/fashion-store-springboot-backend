<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Đổi Trả - Admin</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
</head>
<body class="bg-light" style="padding-top: 100px;">

<div th:replace="~{fragments/header :: adminheader}"></div>

<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-arrow-return-left text-warning me-2"></i>Yêu Cầu Đổi Trả</h2>
    </div>

    <div th:if="${successMessage}" class="alert alert-success fw-bold" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger fw-bold" th:text="${errorMessage}"></div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-3">ID Đơn</th>
                    <th>Khách Hàng</th>
                    <th>Lý Do Trả</th>
                    <th>Ngày Yêu Cầu</th>
                    <th>Trạng Thái</th>
                    <th class="text-center">Thao Tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="req : ${returnRequests}">
                    <td class="ps-3"><a th:href="@{'/order/details/' + ${req.order.orderId}}" target="_blank" class="fw-bold text-decoration-none">#[[${req.order.orderId}]]</a></td>
                    <td>
                        <div class="fw-bold" th:text="${req.customer.fullName}"></div>
                        <small class="text-muted" th:text="${req.customer.phone}"></small>
                    </td>
                    <td>
                        <span class="badge bg-secondary mb-1" th:text="${req.reason}"></span>
                        <div class="small text-truncate" style="max-width: 250px;" th:title="${req.description}" th:text="${req.description}"></div>
                    </td>
                    <td th:text="${#dates.format(req.requestDate, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <span th:if="${req.status.name() == 'PENDING'}" class="badge bg-warning text-dark">Chờ Xử Lý</span>
                        <span th:if="${req.status.name() == 'APPROVED'}" class="badge bg-info text-dark">Đã Duyệt (Chờ nhận hàng)</span>
                        <span th:if="${req.status.name() == 'REJECTED'}" class="badge bg-danger">Từ Chối</span>
                        <span th:if="${req.status.name() == 'COMPLETED'}" class="badge bg-success">Hoàn Tất</span>
                    </td>
                    <td class="text-center">
                        <button type="button" class="btn btn-sm btn-dark" data-bs-toggle="modal" th:data-bs-target="'#updateModal' + ${req.returnId}">
                            Xử lý
                        </button>

                        <div class="modal fade text-start" th:id="'updateModal' + ${req.returnId}" tabindex="-1" aria-hidden="true">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title fw-bold">Xử Lý Yêu Cầu Cho Đơn #[[${req.order.orderId}]]</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <form th:action="@{'/admin/returns/update/' + ${req.returnId}}" method="post">
                                        <div class="modal-body">
                                            <div class="mb-3">
                                                <label class="fw-bold mb-2">Đổi Trạng Thái Thành:</label>
                                                <select name="status" class="form-select">
                                                    <option value="PENDING" th:selected="${req.status.name() == 'PENDING'}">Chờ Xử Lý (PENDING)</option>
                                                    <option value="APPROVED" th:selected="${req.status.name() == 'APPROVED'}">Đồng ý cho trả hàng (APPROVED)</option>
                                                    <option value="REJECTED" th:selected="${req.status.name() == 'REJECTED'}">Từ chối trả hàng (REJECTED)</option>
                                                    <option value="COMPLETED" th:selected="${req.status.name() == 'COMPLETED'}">Đã nhận hàng & Hoàn tất (COMPLETED)</option>
                                                </select>
                                            </div>
                                            <div class="mb-3">
                                                <label class="fw-bold mb-2">Ghi chú gửi Khách hàng (Tùy chọn):</label>
                                                <textarea name="adminNote" class="form-control" rows="3" placeholder="Ví dụ: Shop từ chối vì áo bị cắt mác..." th:text="${req.adminNote}"></textarea>
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="submit" class="btn btn-primary w-100 fw-bold">Cập Nhật</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(returnRequests)}">
                    <td colspan="6" class="text-center text-muted py-5">Chưa có yêu cầu trả hàng nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
