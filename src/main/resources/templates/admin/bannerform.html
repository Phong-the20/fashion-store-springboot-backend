<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Banner - Admin</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
</head>
<body class="bg-light" style="padding-top: 100px;">

<div th:replace="~{fragments/header :: adminheader}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm rounded-4 border-0">
                <div class="card-header bg-primary text-white rounded-top-4 py-3">
                    <h4 class="mb-0 fw-bold" th:text="${banner.bannerId == null ? 'Thêm Banner Mới' : 'Cập Nhật Banner'}">Form Banner</h4>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/admin/banners/save}" th:object="${banner}" method="post">

                        <input type="hidden" th:field="*{bannerId}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tiêu đề Banner</label>
                            <input type="text" th:field="*{title}" class="form-control" placeholder="Ví dụ: Bộ sưu tập mùa Hè 2026">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Đường dẫn Hình ảnh (URL) <span class="text-danger">*</span></label>
                            <input type="url" th:field="*{imageUrl}" class="form-control" required placeholder="Ví dụ: https://example.com/banner.jpg">
                            <small class="text-muted">Copy link ảnh từ mạng hoặc Imgur dán vào đây.</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Link đích (Khi khách click vào ảnh)</label>
                            <input type="text" th:field="*{targetLink}" class="form-control" placeholder="Ví dụ: /products/category/1">
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Thứ tự hiển thị</label>
                                <input type="number" th:field="*{displayOrder}" class="form-control" min="0" placeholder="Số nhỏ xếp trước (0, 1, 2...)">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Trạng thái</label>
                                <select th:field="*{isActive}" class="form-select">
                                    <option value="true">Bật (Hiển thị ra trang chủ)</option>
                                    <option value="false">Tắt (Lưu tạm, chưa hiển thị)</option>
                                </select>
                            </div>
                        </div>

                        <hr>
                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/admin/banners}" class="btn btn-secondary px-4 rounded-pill">Quay Lại</a>
                            <button type="submit" class="btn btn-primary px-4 rounded-pill fw-bold">Lưu Banner</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
