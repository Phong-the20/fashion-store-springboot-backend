<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - FashionStore</title>
    
    <!-- Bootstrap 5 CSS -->
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <!-- Common Styles -->
    <link th:href="@{/css/common.css}" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <!-- Common Styles -->
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        body {
            background-color: #FFF5F7;
            padding-top: 100px;
        }
        
        /* Fix navbar positioning */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .main-content {
            padding: 40px 0;
            min-height: 70vh;
        }
        
        .page-header {
            margin-bottom: 30px;
        }
        
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            color: #2F2F2F;
            font-size: 2rem;
        }
        
        .wishlist-count {
            color: #7A7A7A;
            margin-top: 5px;
        }
        
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
            position: relative;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .product-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        
        .product-info {
            padding: 20px;
        }
        
        .product-name {
            font-weight: 600;
            color: #2F2F2F;
            margin-bottom: 8px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        
        .product-name:hover {
            color: #F06292;
        }
        
        .product-image {
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .product-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #F06292;
            margin-bottom: 15px;
        }
        
        .old-price {
            text-decoration: line-through;
            color: #7A7A7A;
            font-size: 1rem;
            margin-left: 10px;
        }
        
        .btn-remove {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .btn-remove:hover {
            background: #dc3545;
            color: white;
            transform: scale(1.1);
        }
        
        .btn-add-cart {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #F06292 0%, #C44569 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-add-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(240, 98, 146, 0.3);
        }
        
        .empty-wishlist {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-wishlist i {
            font-size: 5rem;
            color: #e0e0e0;
            margin-bottom: 20px;
        }
        
        .empty-wishlist h3 {
            color: #2F2F2F;
            margin-bottom: 10px;
        }
        
        .empty-wishlist p {
            color: #7A7A7A;
            margin-bottom: 20px;
        }
        
        /* Update styles to match pink color scheme */
        .page-header h1 {
            color: #F06292;
        }
        
        .product-price {
            color: #F06292;
        }
        
        .btn-add-cart {
            background: linear-gradient(135deg, #F06292 0%, #C44569 100%);
        }
    </style>
</head>
<body>

<!-- Header -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="main-content">
    <div class="container">
        <div class="page-header">
            <h1><i class="bi bi-heart-fill"></i> Danh Sách Yêu Thích</h1>
            <p class="wishlist-count" th:text="'Bạn có ' + ${wishlistCount} + ' sản phẩm trong danh sách yêu thích'">Bạn có 0 sản phẩm trong danh sách yêu thích</p>
        </div>

        <div class="wishlist-grid" th:if="${wishlistItems != null and !#lists.isEmpty(wishlistItems)}">
            <div class="product-card" th:each="item : ${wishlistItems}">
                <form th:action="@{/wishlist/remove}" method="post" style="display: inline; margin: 0;">
                    <input type="hidden" name="productId" th:value="${item.product.productId}">
                    <button type="submit" class="btn-remove" onclick="return confirm('Bạn có muốn xóa sản phẩm này khỏi danh sách yêu thích?');">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </form>
                <a th:href="@{/products/detail/{id}(id=${item.product.productId})}">
                    <img th:if="${item.product.variants != null and !item.product.variants.isEmpty() and item.product.variants[0].imageUrl != null}" 
                         th:src="@{${item.product.variants[0].imageUrl}}" 
                         alt="Product" 
                         class="product-image"
                         onerror="this.src='https://via.placeholder.com/280x300/667eea/ffffff?text=Product'">
                    <img th:unless="${item.product.variants != null and !item.product.variants.isEmpty() and item.product.variants[0].imageUrl != null}" 
                         src="https://via.placeholder.com/280x300/667eea/ffffff?text=Product" 
                         alt="Product" 
                         class="product-image">
                </a>
                <div class="product-info">
                    <a th:href="@{/products/detail/{id}(id=${item.product.productId})}" style="text-decoration: none; color: inherit;">
                        <div class="product-name" th:text="${item.product.productName}">Product Name</div>
                    </a>
                    <div class="product-price">
                        <span th:if="${item.product.variants != null and !item.product.variants.isEmpty()}" 
                              th:text="${#numbers.formatDecimal(item.product.variants[0].price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                        <span th:unless="${item.product.variants != null and !item.product.variants.isEmpty()}">Liên hệ để biết giá</span>
                    </div>
                    <a th:href="@{/products/detail/{id}(id=${item.product.productId})}" 
                       class="btn-add-cart" 
                       style="text-decoration: none; display: block; text-align: center;">
                        <i class="bi bi-eye"></i> Xem chi tiết
                    </a>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div class="empty-wishlist" th:if="${wishlistItems == null or #lists.isEmpty(wishlistItems)}" id="emptyState">
            <i class="bi bi-heart"></i>
            <h3>Danh Sách Yêu Thích Trống</h3>
            <p>Lưu các sản phẩm yêu thích của bạn tại đây để mua sau</p>
            <a href="/fashionstore/products" class="btn btn-primary"><i class="bi bi-shop"></i> Tiếp Tục Mua Sắm</a>
        </div>
    </div>
</div>

<!-- Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
