<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Mật Khẩu - FashionStore</title>

    <!-- Bootstrap 5 CSS -->
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <!-- Common Styles -->
    <link th:href="@{/css/common.css}" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Common Styles -->
    <link rel="stylesheet" th:href="@{/css/common.css}">

    <style>
        body {
            background-color: #FFF5F7;
            color: #2F2F2F;
            padding-top: 80px;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }

        .change-password-section {
            padding: 5rem 0;
            min-height: calc(100vh - 200px);
        }

        .change-password-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            padding: 3rem;
            max-width: 480px;
            margin: 0 auto;
        }

        .icon-box {
            width: 64px;
            height: 64px;
            background: #FFF5F7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .icon-box i {
            color: #F06292;
            font-size: 1.8rem;
        }

        .change-password-card h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2F2F2F;
            margin-bottom: 0.8rem;
            text-align: center;
        }

        .change-password-card > p {
            color: #7A7A7A;
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #2F2F2F;
            margin-bottom: 0.5rem;
        }

        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid #EAEAEA;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #F48FB1;
            box-shadow: 0 0 0 0.2rem rgba(244, 143, 177, 0.1);
        }

        .btn-update {
            width: 100%;
            background: linear-gradient(135deg, #F06292 0%, #F48FB1 100%);
            border: none;
            padding: 0.9rem;
            border-radius: 12px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(240, 98, 146, 0.3);
            color: white;
        }

        .back-link {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f0f0f0;
            text-align: center;
        }

        .back-link a {
            color: #7A7A7A;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #F06292;
        }

        @media (max-width: 576px) {
            .change-password-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

<!-- Header -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Change Password Section -->
<section class="change-password-section">
    <div class="container">
        <div class="change-password-card">

            <div class="icon-box">
                <i class="bi bi-lock"></i>
            </div>

            <h1>Đổi Mật Khẩu</h1>
            <p>Vui lòng nhập mật khẩu hiện tại và mật khẩu mới để cập nhật.</p>

            <!-- Error Message -->
            <div th:if="${error}" class="alert alert-danger" role="alert" style="border-radius: 10px; margin-bottom: 1.5rem;">
                <i class="bi bi-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- Success Message -->
            <div th:if="${success}" class="alert alert-success" role="alert" style="border-radius: 10px; margin-bottom: 1.5rem;">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${success}"></span>
            </div>

            <form method="post" th:action="@{/customer/change-password}">
                <div class="mb-3">
                    <label class="form-label">Mật khẩu hiện tại</label>
                    <input type="password" name="currentPassword" class="form-control" placeholder="Nhập mật khẩu hiện tại" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mật khẩu mới</label>
                    <input type="password" name="newPassword" class="form-control" placeholder="6 ký tự chữ hoặc số" required
                           pattern="^[A-Za-z0-9]{6}$" minlength="6" maxlength="6" title="Mật khẩu chỉ gồm 6 ký tự chữ và số">
                </div>

                <div class="mb-3">
                    <label class="form-label">Xác nhận mật khẩu mới</label>
                    <input type="password" name="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu mới" required
                           pattern="^[A-Za-z0-9]{6}$" minlength="6" maxlength="6" title="Mật khẩu chỉ gồm 6 ký tự chữ và số">
                </div>

                <button type="submit" class="btn-update">
                    <i class="bi bi-check-circle me-2"></i>Cập nhật mật khẩu
                </button>
            </form>

            <div class="back-link">
                <a th:href="@{/profile}">
                    <i class="bi bi-arrow-left me-2"></i>Quay lại Trang cá nhân
                </a>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
