<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán - FashionStore</title>

    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/common.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --primary-color: #FF6B9D; --secondary-color: #C44569; --bg-light: #fcfcfc; --dark-text: #2C3E50; }
        body { background-color: var(--bg-light); padding-top: 80px; font-family: 'Poppins', sans-serif; color: var(--dark-text); }

        /* Navbar Styles */
        .navbar {
            background: rgba(255, 255, 255, 0.98);
            padding: 1rem 0;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-link {
            color: var(--dark-text);
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
            padding: 0.5rem 1rem;
        }

        .nav-link:hover {
            color: var(--primary-color);
        }

        .nav-icons {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }

        .nav-icon {
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--dark-text);
        }

        .nav-icon:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Mega Dropdown */
        .nav-item {
            position: relative;
        }

        .mega-dropdown {
            position: absolute;
            top: 100%;
            left: -200px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 2rem;
            min-width: 600px;
            display: none;
            z-index: 1000;
        }

        .nav-item:hover .mega-dropdown {
            display: block;
        }

        .page-title { font-family: 'Playfair Display', serif; font-weight: 700; text-align: center; margin-bottom: 2rem; }
        .checkout-box { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); border: 1px solid #f1f1f1; margin-bottom: 20px; }
        .section-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 2px solid #eee; }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #e0e0e0; }
        .form-control:focus { border-color: var(--primary-color); box-shadow: 0 0 0 0.2rem rgba(255, 107, 157, 0.25); }

        /* Custom Radio */
        .custom-radio-card { border: 1px solid #e0e0e0; border-radius: 12px; padding: 15px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 15px; }
        .form-check-input:checked + .custom-radio-card { border-color: var(--primary-color); background-color: #fff0f5; box-shadow: 0 4px 10px rgba(255, 107, 157, 0.1); }
        .form-check-input { display: none; }
        .radio-circle { width: 20px; height: 20px; border: 2px solid #ccc; border-radius: 50%; display: inline-block; position: relative; }
        .form-check-input:checked + .custom-radio-card .radio-circle::after { content: ''; width: 10px; height: 10px; background: var(--primary-color); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .order-summary-box { position: sticky; top: 100px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .summary-total { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 2px dashed #eee; font-weight: 700; font-size: 1.2rem; color: var(--primary-color); }

        .btn-checkout { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 700; transition: all 0.3s; margin-top: 20px;}
        .btn-checkout:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 107, 157, 0.3); }
        .product-mini-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }

        /* Address Display Styles */
        .address-display-section { margin-top: 10px; }
        .current-address-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .current-address-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(255, 107, 157, 0.1);
        }
        .address-content {
            display: flex;
            align-items: center;
            flex: 1;
        }
        .address-text {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container mb-5">
    <h2 class="page-title">Thanh Toán</h2>

    <div th:if="${errorMessage}" class="alert alert-danger mb-4" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="alert alert-success mb-4" th:text="${successMessage}"></div>

    <div class="row">
        <div class="col-lg-8">
            <form id="checkoutForm" th:action="@{/order/checkout/place-order}" method="POST">
                <div class="checkout-box">
                    <h4 class="section-title"><i class="bi bi-geo-alt me-2"></i>Thông Tin Giao Hàng</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label>Họ và Tên <span class="text-danger">*</span></label>
                            <input type="text" name="fullName" th:value="${fullName}" class="form-control">
                            <small class="text-danger" th:if="${errorFullName}" th:text="${errorFullName}"></small>
                        </div>

                        <div class="col-md-6">
                            <label>Số điện thoại <span class="text-danger">*</span></label>
                            <input type="text" name="phone" th:value="${phone}" class="form-control">
                            <small class="text-danger" th:if="${errorPhone}" th:text="${errorPhone}"></small>
                        </div>

                        <div class="col-12">
                            <label>Địa chỉ nhận hàng <span class="text-danger">*</span></label>
                            <div class="address-display-section">
                                <div class="current-address-card">
                                    <div class="address-content">
                                        <i class="bi bi-geo-alt-fill text-primary me-2"></i>
                                        <span th:text="${address != null ? address : 'Chưa có địa chỉ'}" class="address-text"></span>
                                    </div>
                                    <button type="button" class="btn btn-outline-primary btn-sm" onclick="changeAddress()">
                                        <i class="bi bi-pencil me-1"></i>Thay đổi
                                    </button>
                                </div>
                                <input type="hidden" name="deliveryAddress" id="deliveryAddress" th:value="${address}" />
                            </div>
                            <small class="text-danger" th:if="${errorAddress}" th:text="${errorAddress}"></small>
                        </div>

                        <div class="col-12">
                            <label class="form-label text-muted small">Ghi chú cho đơn hàng (Tùy chọn)</label>
                            <textarea class="form-control" name="note" rows="2" placeholder="Giao trong giờ hành chính..." th:text="${note}"></textarea>
                        </div>
                    </div>
                </div>

                <div class="checkout-box">
                    <h4 class="section-title"><i class="bi bi-truck me-2"></i>Phương Thức Giao Hàng</h4>
                    <div class="d-flex flex-column gap-3">
                        <label>
                            <input type="radio" class="form-check-input" name="deliveryMethod" value="standard" checked onchange="updateTotal(30000)">
                            <div class="custom-radio-card">
                                <div class="radio-circle"></div>
                                <div class="flex-grow-1">
                                    <div class="fw-bold">Giao hàng tiêu chuẩn - 30.000đ</div>
                                    <div class="text-muted small">Nhận hàng trong 3-5 ngày làm việc</div>
                                </div>
                            </div>
                        </label>

                        <label>
                            <input type="radio" class="form-check-input" name="deliveryMethod" value="express" onchange="updateTotal(50000)">
                            <div class="custom-radio-card">
                                <div class="radio-circle"></div>
                                <div class="flex-grow-1">
                                    <div class="fw-bold">Giao hàng hỏa tốc - 50.000đ</div>
                                    <div class="text-muted small">Nhận hàng trong 1-2 ngày làm việc</div>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="checkout-box">
                    <h4 class="section-title"><i class="bi bi-wallet2 me-2"></i>Phương Thức Thanh Toán</h4>
                    <div class="d-flex flex-column gap-3">
                        <label>
                            <input type="radio" class="form-check-input" name="paymentMethod" value="COD" checked>
                            <div class="custom-radio-card">
                                <div class="radio-circle"></div>
                                <div>
                                    <div class="fw-bold">Thanh toán khi nhận hàng (COD)</div>
                                    <div class="text-muted small">Thanh toán bằng tiền mặt khi shipper giao tới</div>
                                </div>
                            </div>
                        </label>

                        <label>
                            <input type="radio" class="form-check-input" name="paymentMethod" value="MOMO">
                            <div class="custom-radio-card">
                                <div class="radio-circle"></div>
                                <div>
                                    <div class="fw-bold">Thanh toán qua Momo</div>
                                    <div class="text-muted small">Quét mã QR hoặc nhập thông tin tài khoản ngân hàng</div>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>

                <input type="hidden" name="totalAmount" id="hiddenTotalAmount" th:value="${finalTotal + 30000}">
            </form>
        </div>

        <div class="col-lg-4">
            <div class="checkout-box order-summary-box">
                <h4 class="section-title">Chi Tiết Đơn Hàng</h4>

                <div style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;">
                    <div class="d-flex gap-3 mb-3" th:each="item : ${cartItems}">
                        <img th:src="${item.productVariant.imageUrl}" class="product-mini-img" onerror="this.src='https://placehold.co/60'">
                        <div class="flex-grow-1">
                            <div class="fw-bold text-truncate" style="max-width: 180px;" th:text="${item.productVariant.product.productName}">Tên SP</div>
                            <div class="text-muted small">
                                Size: <span th:text="${item.productVariant.categorySize.sizeName}"></span> |
                                Màu: <span th:text="${item.productVariant.color.colorName}"></span>
                            </div>
                            <div class="d-flex justify-content-between mt-1">
                                <span class="text-muted small" th:text="'x' + ${item.quantity}">x1</span>
                                <span class="fw-bold text-primary" th:text="${#numbers.formatDecimal(item.productVariant.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                            </div>
                        </div>
                    </div>
                </div>

                <form th:action="@{/order/apply-voucher}" method="post" class="mb-4 mt-4">
                    <label class="form-label fw-bold"><i class="bi bi-ticket-perforated me-2"></i>Mã Giảm Giá</label>
                    <div class="d-flex gap-2">
                        <select name="voucherCode" class="form-select">
                            <option value="">-- Bỏ chọn mã --</option>
                            <option th:each="voucher : ${validVouchers}"
                                    th:value="${voucher.code}"
                                    th:text="${voucher.code + ' - Giảm ' + #numbers.formatDecimal(voucher.discountValue, 0, 'COMMA', 0, 'POINT') + 'đ'}"
                                    th:selected="${appliedVoucher != null and appliedVoucher.code == voucher.code}">
                            </option>
                        </select>
                        <button type="submit" class="btn btn-dark" style="white-space: nowrap;">Áp dụng</button>
                    </div>
                </form>

                <hr class="text-muted">

                <div class="summary-item">
                    <span class="text-muted">Tạm tính:</span>
                    <span class="fw-bold" th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                </div>

                <div class="summary-item">
                    <span class="text-muted">Phí vận chuyển:</span>
                    <span class="fw-bold" id="displayShippingFee">30.000đ</span>
                </div>

                <div class="summary-item" th:if="${discountAmount != null and discountAmount > 0}">
                    <span class="text-muted">Giảm giá (<span th:text="${appliedVoucher.code}"></span>):</span>
                    <span class="fw-bold text-danger" th:text="'-' + ${#numbers.formatDecimal(discountAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">-0đ</span>
                </div>

                <div class="summary-total">
                    <span>Tổng thanh toán:</span>
                    <span id="displayTotalAmount" th:text="${#numbers.formatDecimal(finalTotal + 30000, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                </div>

                <button type="submit" form="checkoutForm" class="btn-checkout" id="submitBtn">ĐẶT HÀNG</button>
                <div class="text-center mt-3">
                    <a th:href="@{/cart}" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Quay lại giỏ hàng</a>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    // Lấy giá trị tiền sau khi đã trừ voucher từ Server (chưa cộng phí ship)
    const serverFinalTotal = /*[[${finalTotal}]]*/ 0;

    // JavaScript chỉ dùng để cộng phí ship (30k hoặc 50k) khi khách bấm nút Radio
    function updateTotal(shippingFee) {
        // 1. Cập nhật UI tiền ship
        document.getElementById('displayShippingFee').textContent = shippingFee.toLocaleString('vi-VN') + 'đ';

        // 2. Tính lại tổng tiền
        const finalPriceWithShip = serverFinalTotal + shippingFee;
        const safeTotal = Math.max(0, finalPriceWithShip);

        // 3. Cập nhật UI tổng tiền
        document.getElementById('displayTotalAmount').textContent = safeTotal.toLocaleString('vi-VN') + 'đ';

        // 4. Cập nhật thẻ input ẩn để submit lên Server lúc Đặt Hàng
        document.getElementById('hiddenTotalAmount').value = safeTotal;
    }

    function changeAddress() {
        window.location.href = '/fashionstore/order/checkout/select-delivery-address';
    }

    // Form validation before submit
    document.addEventListener('DOMContentLoaded', function() {
        const checkoutForm = document.getElementById('checkoutForm');

        if (checkoutForm) {
            checkoutForm.addEventListener('submit', function(e) {
                // Lấy phương thức thanh toán
                const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;

                // Xử lý riêng cho MOMO (Vì MOMO phải gọi sang một đường dẫn API khác)
                if (paymentMethod === 'MOMO') {
                    e.preventDefault();

                    const fullName = document.querySelector('input[name="fullName"]').value.trim();
                    const totalAmount = document.getElementById('hiddenTotalAmount').value;
                    const orderId = 'ORD-' + Date.now();
                    const orderInfo = 'Thanh toan don hang - ' + fullName;

                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/fashionstore/payment/momo/create';

                    const orderIdInput = document.createElement('input');
                    orderIdInput.type = 'hidden';
                    orderIdInput.name = 'orderId';
                    orderIdInput.value = orderId;
                    form.appendChild(orderIdInput);

                    const amountInput = document.createElement('input');
                    amountInput.type = 'hidden';
                    amountInput.name = 'amount';
                    amountInput.value = totalAmount;
                    form.appendChild(amountInput);

                    const orderInfoInput = document.createElement('input');
                    orderInfoInput.type = 'hidden';
                    orderInfoInput.name = 'orderInfo';
                    orderInfoInput.value = orderInfo;
                    form.appendChild(orderInfoInput);

                    document.body.appendChild(form);
                    form.submit();
                    return false;
                }

                // NẾU LÀ COD: Để cho form submit tự nhiên bay thẳng về Java Backend
                // Java Backend sẽ tự kiểm tra và trả về lỗi màu đỏ trên giao diện (nếu có)
                return true;
            });
        }
    });
</script>

</body>
</html>
