<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fashion Store</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden; max-width: 1000px; width: 100%;
            display: grid; grid-template-columns: 1fr 1fr;
        }
        .login-left {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 40px; color: white;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
        }
        .login-left h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 20px; font-weight: 700; }
        .login-left p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 30px; }
        .login-left .illustration { width: 100%; max-width: 300px; margin-top: 30px; }
        .login-right { padding: 60px 40px; }
        .login-right h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 10px; color: #333; }
        .login-right p { color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-control {
            width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 1rem; transition: all 0.3s;
        }
        .form-control:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .password-toggle { position: relative; }
        .password-toggle input { padding-right: 45px; }
        .password-toggle .toggle-icon {
            position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%); cursor: pointer; color: #666;
        }
        .remember-forgot { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .remember-me { display: flex; align-items: center; gap: 8px; }
        .remember-me input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .forgot-password { color: #667eea; text-decoration: none; font-size: 0.9rem; }
        .forgot-password:hover { text-decoration: underline; }
        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
        .divider { text-align: center; margin: 25px 0; position: relative; }
        .divider::before, .divider::after {
            content: ''; position: absolute; top: 50%; width: 45%; height: 1px; background: #e0e0e0;
        }
        .divider::before { left: 0; } .divider::after { right: 0; }
        .social-btn {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px;
            background: white; display: flex; align-items: center; justify-content: center;
            gap: 8px; font-weight: 500; text-decoration: none; color: #333; transition: all 0.3s;
        }
        .social-btn:hover { border-color: #667eea; background: #f8f9ff; }
        .register-link { text-align: center; margin-top: 25px; color: #666; }
        .register-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .alert { padding: 12px 15px; border-radius: 10px; margin-bottom: 20px; }
        .alert-danger { background: #fee; color: #c33; border: 1px solid #fcc; }
        @media (max-width: 768px) {
            .login-container { grid-template-columns: 1fr; }
            .login-left { display: none; }
            .login-right { padding: 40px 30px; }
        }
    </style>
</head>

<body>
<div class="login-container">
    <div class="login-left">
        <div>
            <h1>Welcome Back!</h1>
            <p>Login to access your account and continue shopping</p>
            <svg class="illustration" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                <circle cx="250" cy="250" r="200" fill="rgba(255,255,255,0.1)"/>
                <circle cx="250" cy="250" r="150" fill="rgba(255,255,255,0.1)"/>
                <circle cx="250" cy="250" r="100" fill="rgba(255,255,255,0.2)"/>
                <path d="M250 150 L250 350 M150 250 L350 250" stroke="white" stroke-width="4" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <div class="login-right">
        <h2>Login</h2>
        <p>Enter your credentials to access your account</p>

        <div class="alert alert-danger" th:if="${error}">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <!-- FORM LOGIN -->
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="email"><i class="bi bi-envelope"></i> Email Address</label>
                <input type="text" class="form-control" id="email" name="username"
                       placeholder="Enter your email" required
                       oninvalid="this.setCustomValidity('Email không được để trống hoặc sai định dạng')"
                       oninput="this.setCustomValidity('')">
            </div>

            <div class="form-group">
                <label for="password"><i class="bi bi-lock"></i> Password</label>
                <div class="password-toggle">

                    <!-- Password must be exactly 6 alphanumeric characters -->
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="6 ký tự, chữ hoặc số" required
                           pattern="^[A-Za-z0-9]{6}$" minlength="6" maxlength="6"
                           title="Mật khẩu chỉ gồm 6 ký tự chữ và số" >

                </div>
            </div>

            <div class="remember-forgot">
                <label class="remember-me">
                    <input type="checkbox" name="remember">
                    <span>Remember me</span>
                </label>
                <a th:href="@{/forgot-password}" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login" style="border: none;">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>

        <div class="divider">or</div>

        <a th:href="@{/oauth2/authorization/google}" class="social-btn" style="text-decoration: none;">
            <i class="bi bi-google"></i> Login with Google
        </a>

        <div class="register-link">
            Don't have an account? <a th:href="@{/register}">Register here</a>
        </div>
    </div>
</div>
</body>
</html>
